# Minimal Hexo fixture site for hexo-tag-cloud tests.
# Pages are served from a static HTTP server during tests; URL is local-only.

title: hexo-tag-cloud fixture
subtitle: ''
description: 'Fixture site for E2E tests'
author: tests
language: en
timezone: UTC

url: http://localhost
root: /
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

index_generator:
  path: ''
  per_page: 10
  order_by: -date

default_category: uncategorized
category_map:
tag_map:

date_format: YYYY-MM-DD
time_format: HH:mm:ss

per_page: 10
pagination_dir: page

theme: fixture-theme

# Exercise every customize knob so the e2e wires through every config branch.
tag_cloud:
  textFont: 'Trebuchet MS, Helvetica'
  textColor: '#333'
  textHeight: 25
  outlineColor: '#E2E1D1'
  maxSpeed: 0.05
  pauseOnSelected: true
