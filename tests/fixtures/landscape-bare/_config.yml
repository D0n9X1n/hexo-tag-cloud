# Bare-landscape fixture for the hexo-tag-cloud install CLI E2E tests.
# Mimics the directory layout of stock hexo-theme-landscape (the one
# `hexo init` ships) without vendoring the upstream theme. Pre-installed
# tag-cloud markup is intentionally absent so the installer's `insert`
# path is exercised; the conflict / legacy / force-replace paths are
# exercised by post-modifying this fixture inside tmpdirs.

title: hexo-tag-cloud landscape-bare
subtitle: ''
description: 'Fixture site for the install CLI'
author: tests
language: en
timezone: UTC

url: http://localhost
root: /
permalink: :title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

new_post_name: :title.md
default_layout: post
titlecase: false
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

index_generator:
  path: ''
  per_page: 10
  order_by: -date

default_category: uncategorized
category_map:
tag_map:

date_format: YYYY-MM-DD
time_format: HH:mm:ss

per_page: 10
pagination_dir: page

theme: landscape
