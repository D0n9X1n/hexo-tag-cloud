# Publishes hexo-tag-cloud to npm when a `v*` tag is pushed.
#
# Pre-flight (manual, before tagging):
#   1. Update CHANGELOG.md with the release date.
#   2. Bump `version` in `package.json` to match the tag (e.g. `v3.0.0` → `3.0.0`).
#   3. Commit, push, then create+push the `v*` tag.
#
# `demo/package.json` is intentionally pinned to `"hexo-tag-cloud": "file:.."`
# at all times. The demo is excluded from the npm tarball (verify-pack.js
# enforces) so this never affects published consumers, and keeping it as a
# local file: ref means the deploy-demo workflow can run on `master` without
# waiting for npm publication (and avoids the circular dependency where the
# demo can't build until the package it references is published).
#
# Auth: Trusted Publishing via OIDC.
#   Configure the trusted publisher on npmjs.com:
#     https://www.npmjs.com/package/hexo-tag-cloud/access
#       → Trusted Publishers → GitHub Actions
#       → org D0n9X1n, repo hexo-tag-cloud, workflow release.yml
#   No long-lived NPM_TOKEN secret is required. The `id-token: write`
#   permission below + npm CLI >= 11.5.1 + `--provenance` is enough.

name: Release to npm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

# Never cancel a half-completed publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to a version that supports OIDC trusted publishing
        # Node 20 ships with npm 10.x; trusted publishing needs >= 11.5.1.
        run: npm install -g npm@^11

      - name: Cache npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node20-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node20-

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install fixture site dependencies
        run: cd tests/fixtures/hexo-site && npm install --no-audit --no-fund && cd ../../..

      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Verify CHANGELOG has dated entry for this version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if ! grep -qE "^## \[${TAG_VERSION}\] — [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a dated entry for ${TAG_VERSION} (still 'Unreleased'?)"
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full test suite (lint + server + e2e)
        run: npm test

      - name: Verify tarball contents
        run: node build/verify-pack.js

      - name: Publish to npm (OIDC trusted publisher + provenance)
        # No NODE_AUTH_TOKEN: npm detects the GitHub Actions OIDC issuer
        # via the id-token permission above and exchanges it with the
        # trusted publisher configured for this package on npmjs.com.
        run: npm publish --provenance --access public
